<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8人制サッカー戦術ボード</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>8人制 戦術ボード</h2>

<div id="field">

    <div class="goal top"></div>
    <div class="center-line"></div>
    <div class="goal bottom"></div>

</div>


<div id="players-area">

<h3>選手一覧</h3>

<div id="player-lists">

    <div class="team">

        <h3 class="yellow-title">🟨 イエロー</h3>

        <div id="player-list-yellow"></div>

    </div>

    <div class="team">

        <h3 class="blue-title">🟦 ブルー</h3>

        <div id="player-list-blue"></div>

    </div>

</div>


<script src="script.js"></script>

</body>
</html>
