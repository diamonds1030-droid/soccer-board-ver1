<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8人制サッカー戦術ボード</title>
<link rel="apple-touch-icon" href="D501ECEC-057A-4E6B-94CA-3618EE505F86.png">
<link rel="icon" type="image/png" href="D501ECEC-057A-4E6B-94CA-3618EE505F86.png">
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3aa655">
</head>

<body>

<h2>48期 戦術ボード</h2>
<div id="toolbar">
    <select id="saveSlot">
        <option value="">保存</option>
        <option value="1">保存①</option>
        <option value="2">保存②</option>
        <option value="3">保存③</option>
    </select>
    <button id="load1">読込①</button>
    <button id="load2">読込②</button>
    <button id="load3">読込③</button>
    <button id="clearFormation">クリア</button>
</div>
<div id="field">

    <div class="goal top"></div>
    <div class="center-line"></div>
    <div class="goal bottom"></div>

</div>

<div id="players-area">

    <div id="player-header">
        <div class="team-title yellow-title">🟨 イエロー</div>
        <div class="team-title blue-title">🟦 ブルー</div>
    </div>

    <div id="player-lists">
        <div id="player-list-yellow"></div>
        <div id="player-list-blue"></div>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
